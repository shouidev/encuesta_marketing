<!DOCTYPE html>
<html>
<head>
  <title>Encuesta Marketing</title>


  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <!-- jsPsych -->
  <script src="https://unpkg.com/jspsych@7.3.0"></script>
  <link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" />

  <!-- Plugins -->
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.0"></script>  
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-multi-select@1.1.0"></script>



 <style>

/* Fondo general */
body{
background-image: url("https://www.utdt.edu/imagen/_149813699038450100.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
}

/* Contenedor */
.jspsych-content{
max-width:900px;
width:95%;
background:rgba(255,255,255,0.95);;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Likert */
.jspsych-survey-likert-statement{
font-size:26px;
margin-bottom:20px;
}

.jspsych-survey-likert-table{
width:100%;
table-layout:fixed;
}

#jspsych-survey-likert-next {
display: none;
}

input, textarea, select {
  font-size: 12px;
}

/* Guardado */

.loading-dots::after {
  content: "";
  animation: dots 1.5s steps(3, end) infinite;
}

@keyframes dots {
  0%   { content: ""; }
  33%  { content: "."; }
  66%  { content: ".."; }
  100% { content: "..."; }
}

/* Mobile */
@media (max-width: 768px){

.jspsych-content{
  width:80%;
  padding:16px;
  max-width: 500px;
  border-radius: 12px;
}

.jspsych-survey-likert-statement{
  font-size:18px;
  margin-bottom:10px;
}

.jspsych-survey-likert-table{
  width:100%;
  table-layout:fixed;
  font-size:12px;
}

.jspsych-survey-likert-table td{
  padding:4px 2px;
}

.jspsych-survey-likert-table input[type="radio"]{
  transform: scale(0.8);
}

.jspsych-btn{
font-size:16px;
padding:10px;
}

body{
  background-attachment: scroll;
}

}

</style>
</head>

<body>

<script>

// BLOQUEAR SI YA RESPONDIÓ
if(localStorage.getItem("encuesta_completada")){
document.body.innerHTML = `
<h2>Esta encuesta ya fue completada desde este dispositivo.</h2>
<p>Muchas gracias por tu participación.</p>
`;
throw new Error("Encuesta ya completada");
}


async function guardarDatos(data){

let contenedor = document.querySelector(".jspsych-content");

if(contenedor){
  contenedor.innerHTML = `
  <div style="text-align:center">
    <h2>Guardando tus respuestas<span class="loading-dots"></span></h2>
  </div>
  `;
}

try {

let formData = new FormData();
formData.append("data", JSON.stringify(data));

await fetch("https://script.google.com/macros/s/AKfycbw8Ar0nAleDgs5xq8OV97C2thaYWohTxWS9P3IcFyKNHm--QNdYGLJOqmPbFxdgjNuQXg/exec", {
  method: "POST",
  mode: "no-cors",
  body: formData
});

} catch (error) {
console.error(error);
}

}

// INICIALIZAR jsPsych
const jsPsych = initJsPsych({
  show_progress_bar: true,
  auto_update_progress_bar: true
});;

// TIMELINE
let timeline = [];


///////////////////////////////////////////////////////////////////////////////////////////////////////////////

// PRESENTACIÓN

timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: `
<div style="text-align:center">
<h2> WASTELESS 2026 </h2>
<p> Hola! Somos un grupo de estudiantes de la Universidad Torcuato di Tella y estamos diseñando un producto para la materia de Marketing. </p>
<p> Les prometemos que no dura más de 5 minutos </p>
<p> Si podes responder la encuesta nos ayudas un montón!</p>
</div>
`,
choices:["Comenzar"]
});


// EDAD
timeline.push({
type: jsPsychSurveyText,
data:{tipo:"edad"},
name: "edad",
questions:[{
prompt:"<b>Edad</b>",
required:true
}],
on_load: function(){

// seleccionar el input REAL que crea jsPsych
let input = document.querySelector('.jspsych-survey-text-question input');

// bloquear letras al tipear
input.addEventListener("keypress", function(e){
if(!/[0-9]/.test(e.key)){
e.preventDefault();
}
});

// limpiar si pegan texto raro
input.addEventListener("input", function(){
this.value = this.value.replace(/[^0-9]/g, '');
});

},
on_finish: function(){
  document.activeElement.blur();
}
});


// UBICACIÓN

timeline.push({
  type: jsPsychSurveyMultiChoice,
  data:{tipo:"provincia"},
  name: "provincia",
  questions: [{
      prompt: "<b>¿Dónde vivís?</b>",
      options: ["Buenos Aires","Ciudad Autónoma de Buenos Aires","Catamarca", "Chaco", "Chubut", "Córdoba","Corrientes", "Entre Ríos", "Formosa", "Jujuy", "La Pampa", "La Rioja", "Mendoza", "Misiones", "Neuquén", "Río Negro", "Salta", "San Juan", "San Luis", "Santa Cruz", "Santa Fé", "Santiago del Estero", "Tierra del Fuego, Antártida e Islas del Atlántico Sur", "Tucumán"],
      required: true
    }
  ]
});

// CONVIVE o COCINA

timeline.push({
  type: jsPsychSurveyMultiChoice,
  data:{tipo: "convivencia_cocina"},
  name: "convivencia_cocina",
    questions:[{
        prompt:"<b>¿Vivís con alguien?</b>",
        options:["Sí", "No"],
        required:true},

        {
        prompt:"<b>¿En tu casa cocinas?</b>",
        options:["Sí", "No"],
        required:true},
    ]
});

// CANTIDAD DE PERSONAS

timeline.push({
timeline:[{
type: jsPsychSurveyMultiChoice,
data:{tipo:"cant_personas"},
name: "cant_personas",
questions:[
    {
prompt:"<b>¿Con cuántas personas convivís?</b>",
options:["1","2 a 4","5 o más"],
required:true}]
}],
conditional_function: function(){
let data = jsPsych.data.get().last(1).values()[0];
return data.response.Q0 === "Sí";
}
});

// DESECHO COMIDA

timeline.push({
  type: jsPsychSurveyMultiChoice,
  data:{tipo:"desecho_frecuencia"},
  questions:[{
    prompt:"<b>¿Con qué frecuencia se desecha la comida en tu casa?</b>",
    options:["Siempre", "Frecuentemente", "A veces","Rara Vez", "Nunca"],
    required:true
  }]
});

// DESECHO
timeline.push({
  type: jsPsychSurveyMultiSelect,
  data: {tipo: "desecho"},
    questions:[{
    prompt:"<b>¿Por qué motivos desechas la comida?</b> Podes seleccionar más de una opción",
    options:["Porque se deterioró o se puso fea en el almacenamiento", "Porque se venció el alimento", "Porque preparé de más","Porque no guardo las sobras", "Otro"],
    required:true,
  }]
});

// PREPARADO DE COMIDA

timeline.push({
timeline:[{
type: jsPsychSurveyMultiSelect,
data:{tipo:"preparacion"},
name: "preparacion",
questions:[
    {prompt:"<b>¿Cuánto antes preparas (o preparan) tu comida antes de comerla?</b> Podes seleccionar más de una opción",
    options:["Como inmediatamente lo que cocino","Entre 2 y 6 horas antes","Entre 6 y 13 horas", "Más de 13 horas"],
    multiple: true,
    required:true},

    {prompt:"<b>¿En dónde almacenas la comida mientras tanto?</b> Podes seleccionar más de una opción",
    options:["En la heladera","En un tupper u otro tipo de contenedor transportable","No la almaceno", "Otro"],
    multiple: true,
    required:true},  
]
}],
})

// RECONOCER ESTADO

timeline.push({
type: jsPsychSurveyMultiSelect,
data:{tipo:"reconocimiento"},
name: "reconocimiento",
questions:[{prompt:"<b>¿Cómo reconoces si un alimento está o no en buen estado?</b> Podes seleccionar más de una opción",
    options:["Fecha de vencimiento","Olor","Apariencia", "Textura", "Utilizo medidores de frío u otros dispositivos", "Otro"],
    required:true}]
});

// RECONOCER SEGURIDAD

timeline.push({
type: jsPsychSurveyMultiChoice,
data:{tipo:"seguridad"},
name: "seguridad",
questions:[{prompt:"<b>¿Qué tan seguro soles estar cuando determinas si un alimento está o no en buen estado? </b>", 
    options:["Muy seguro","Bastante seguro","Algo seguro", "Poco seguro", "Nada seguro"],
    required:true}]
});


//  DESPERDICIO

timeline.push({
timeline:[{
type: jsPsychSurveyMultiChoice,
data:{tipo:"desperdicio"},
name: "desperdicio",
questions:[
    {prompt:"<b>¿Con qué frecuencia tirás alimentos “por las dudas” si están en mal estado (para evitar comerlos)? </b>",
    options:["Siempre", "Frecuentemente", "A veces","Rara Vez", "Nunca"],
    required:true},

    {prompt:"<b>¿Qué tan importante es para vos evitar desperdiciar comida? </b>",
    options:["Muy importante", "Bastante importante", "Algo importante","Poco importante", "Nada importante"],
    required:true},  
]
}],
})

// PRESENTACIÓN PRODUCTO

timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus:`  <p> Nuestro producto busca solucionar el problema de los desechos domésticos </p>
            <p> Se trata de un <b> botón inteligente </b> que se integra a un envase, ya sea de comida o bebida,  </p>
            <p> y <b> cambia de color según el estado real del alimento </b> </p>`,
choices:["Continuar"]
});


// PRODUCTO

timeline.push({
  type: jsPsychHtmlButtonResponse,
  data:{tipo: "producto"},
  name: "producto",
  stimulus: "<b> ¿Cuánto te interesaría usarlo? </b>",
  choices: ["Mucho", "Bastante", "Algo", "Poco", "Nada"],
});


// MOTIVOS

timeline.push({
timeline:[{
type: jsPsychSurveyMultiSelect,
data:{tipo:"motivos"},
name: "motivos",
questions:[
    {prompt:"<b>¿Cuál sería tu motivación para comprarlo? </b> Podes seleccionar más de una opción ",
    options:["Evitar el desecho de comida", "Cuidado de la salud", "Practicidad","Otro"],
    multiple: true,
    required:true},

    {prompt:"<b>¿En qué contexto lo utilizarías? </b> Podes seleccionar más de una opción ",
    options:["Cuando traslado comida durante el día", "Cuando almaceno comida en la heladera", "Si me voy de camping o me hospedo en algún lugar al aire libre","Otro"],
    multiple: true,
    required:true},  
]
}],
conditional_function: function(){
let data = jsPsych.data.get().last(1).values()[0];
return data.response.Q0 !== "Nada";;
}
});

// DISPOSITIVO

timeline.push({
timeline:[{
type: jsPsychSurveyMultiChoice,
data:{tipo:"dispositivo"},
name: "dispositivo",
questions:[
    {prompt:"<b>¿Confiarías en un dispositivo para evaluar la calidad de los alimentos?</b>",
    options:["Mucho", "Bastante", "Algo", "Poco","Nada"],
    required:true},

    {prompt:"<b>¿Qué te generaría más dudas sobre el producto? </b>",
    options:["Precisión", "Precio", "Durabilidad","Que sea fácil de utilizar", "Otro"],
    required:true},  
]
}],
});

// PRESENTACIÓN PRODUCTO 2

timeline.push({
type: jsPsychHtmlButtonResponse,
stimulus: ` <p> Cada botón estaría diseñado para tener una larga vida útil y ser reutilizables. </p>
            <p> La batería es recargable, y el botón puede adherirse y despegarse de cada contenedor </p> `,
choices:["Continuar"]
});

// VENTA

timeline.push({
timeline:[{
type: jsPsychSurveyMultiChoice,
data:{tipo:"venta"},
name: "venta",
questions:[
    {prompt:"<b>¿Cuánto estarías dispuesto a pagar por una unidad de este producto?</b>",
    options:["<30.000 pesos", "30.000 - 49.999 pesos", "50.000 - 69.999 pesos", ">70.000 pesos"],
    required:true},

    {prompt:"<b> ¿Qué probabilidad hay de que compres este producto? </b>",
    options:["Muy Alta", "Alta", "Media","Baja", "Nula"],
    required:true},  
]
}],
});

//////////////////////////////////////////////////////////

// GUARDAR RESPUESTAS

timeline.push({
type: jsPsychHtmlButtonResponse,

stimulus: ``,

choices:[],

on_load: async function(){

let raw = jsPsych.data.get().values();

let limpio = {
  timestamp: new Date().toISOString()
};

raw.forEach(trial => {

  if(!trial.response) return;

  //////////////////////////////////////
  // FUNCION PARA NORMALIZAR RESPUESTA
  //////////////////////////////////////
  let getResp = () => {

    // caso survey-text o likert
    if(typeof trial.response === "object"){
      return Object.values(trial.response)[0];
    }

    // caso botones
    return trial.response;
  };

  //////////////////////////////////////
  // EDAD
  //////////////////////////////////////
  if(trial.tipo === "edad"){
    limpio.edad = Number(getResp());
  }

  //////////////////////////////////////
  // PROVINCIA
  //////////////////////////////////////
  if(trial.tipo === "provincia"){
    limpio.provincia = getResp();
  }

  //////////////////////////////////////
  // CONVIVENCIA
  //////////////////////////////////////
  if(trial.tipo === "convivencia_cocina"){
    limpio.convivencia = trial.response.Q0;
    limpio.cocina = trial.response.Q1;}

  //////////////////////////////////////
  // CANTIDAD PERSONAS
  //////////////////////////////////////
  if(trial.tipo === "cant_personas"){
    limpio.cant_personas = getResp();
  }

  //////////////////////////////////////
  // DESECHO
  //////////////////////////////////////
  if(trial.tipo === "desecho_frecuencia"){
    if(typeof trial.response === "object"){
      limpio.frecuencia_desecho = trial.response.Q0;
    }
  }

  if(trial.tipo === "desecho"){
    limpio.motivos_desecho = trial.response.Q0;
}

  //////////////////////////////////////
  // PREPARACIÓN
  //////////////////////////////////////
  if(trial.tipo === "preparacion"){
    limpio.tiempo_preparacion = trial.response.Q0;
    limpio.almacenamiento = trial.response.Q1;
  }

  //////////////////////////////////////
  // RECONOCIMIENTO
  //////////////////////////////////////
  if(trial.tipo === "reconocimiento"){
    limpio.metodos = trial.response.Q0;
  }

  //////////////////////////////////////
  // SEGURIDAD
  //////////////////////////////////////

    if(trial.tipo === "seguridad"){
    limpio.seguridad = trial.response.Q0;
  }

  //////////////////////////////////////
  // DESPERDICIO
  //////////////////////////////////////
  if(trial.tipo === "desperdicio"){
    limpio.tirar_duda = trial.response.Q0;
    limpio.importancia = trial.response.Q1;
  }

  //////////////////////////////////////
  // PRODUCTO INTERÉS
  //////////////////////////////////////
  if(trial.tipo === "producto"){
    limpio.interes = getResp();
  }

  //////////////////////////////////////
  // MOTIVOS
  //////////////////////////////////////
    if(trial.tipo === "motivos"){
        limpio.motivos_compra = trial.response.Q0;
        limpio.contexto_uso = trial.response.Q1;
    }

  //////////////////////////////////////
  // DISPOSITIVO
  //////////////////////////////////////
  if(trial.tipo === "dispositivo"){
    limpio.confianza = trial.response.Q0;
    limpio.dudas = trial.response.Q1;
  }

  //////////////////////////////////////
  // VENTA
  //////////////////////////////////////
  if(trial.tipo === "venta"){
    limpio.precio = trial.response.Q0;
    limpio.prob_compra = trial.response.Q1;
  }

});

await guardarDatos(limpio);

localStorage.setItem("encuesta_completada","true");

document.querySelector(".jspsych-content").innerHTML = `
<div style="
text-align:center;
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
">

<h2>¡Respuestas guardadas correctamente!</h2>
<p> Gracias por responder ❤️</p>
</div>
`;

}

});

// INICIAR

jsPsych.run(timeline);

</script>
</body>
</html>

</script>
</body>
</html>
